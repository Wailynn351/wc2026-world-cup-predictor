<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WC2026 Predictor — {% block title %}Dashboard{% endblock %}</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --border: #2a2a4a;
            --text: #e0e0e0;
            --dim: #8888aa;
            --green: #4ade80;
            --yellow: #facc15;
            --red: #f87171;
            --cyan: #22d3ee;
            --accent: #818cf8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav .brand {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--cyan);
            text-decoration: none;
            margin-right: auto;
        }
        nav a {
            color: var(--dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.15s;
        }
        nav a:hover, nav a.active { color: var(--text); }

        /* Layout */
        .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        h2 { font-size: 1.2rem; margin: 1.5rem 0 0.75rem; color: var(--cyan); }
        p.subtitle { color: var(--dim); margin-bottom: 1.5rem; }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
        }

        /* Match card */
        .match-card {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 1rem;
            align-items: center;
        }
        .match-card .team { font-weight: 600; font-size: 1.05rem; }
        .match-card .team.home { text-align: right; }
        .match-card .score {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            min-width: 70px;
        }
        .match-card .score.live { color: var(--red); }
        .match-card .score.ft { color: var(--dim); }
        .match-card .meta {
            text-align: center;
            font-size: 0.8rem;
            color: var(--dim);
        }

        /* Status badges */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge.live { background: #f8717122; color: var(--red); }
        .badge.ft { background: #88888822; color: var(--dim); }
        .badge.upcoming { background: #818cf822; color: var(--accent); }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 0.5rem 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th { color: var(--dim); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
        tr:hover { background: #ffffff05; }

        /* Prediction bars */
        .bar-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.3rem 0;
            font-size: 0.85rem;
        }
        .bar-row .label { min-width: 100px; }
        .bar-row .bar-track {
            flex: 1;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .bar-row .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }
        .bar-fill.green { background: var(--green); }
        .bar-fill.yellow { background: var(--yellow); }
        .bar-fill.red { background: var(--red); }

        /* Forms */
        select, input, button {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            font-size: 0.9rem;
        }
        select:focus, input:focus { outline: none; border-color: var(--cyan); }
        button {
            cursor: pointer;
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            font-weight: 600;
        }
        button:hover { opacity: 0.9; }

        .form-row {
            display: flex;
            gap: 0.75rem;
            align-items: end;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
        .form-group label { font-size: 0.8rem; color: var(--dim); }

        /* Grid layouts */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }

        /* Prediction card */
        .prediction-result {
            text-align: center;
            padding: 1.5rem;
        }
        .prediction-result .winner {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0.5rem 0;
        }
        .prediction-result .confidence {
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        .confidence.low { color: var(--red); }
        .confidence.medium { color: var(--yellow); }
        .confidence.high { color: var(--green); }

        /* Accuracy */
        .accuracy { font-weight: 600; margin-left: 0.5rem; }
        .accuracy.correct { color: var(--green); }
        .accuracy.miss { color: var(--red); }

        /* API warning */
        .api-warning {
            background: #facc1522;
            border: 1px solid #facc1544;
            border-radius: 6px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: var(--yellow);
        }
        .api-warning code { background: #00000033; padding: 1px 5px; border-radius: 3px; }

        /* Utility classes */
        .text-center { text-align: center; }
        .text-dim { color: var(--dim); }
        .text-sm { font-size: 0.85rem; }
        .text-xs { font-size: 0.75rem; }
        .font-bold { font-weight: 600; }
        .link-reset { text-decoration: none; color: inherit; }
        .match-meta { text-align: center; font-size: 0.8rem; color: var(--dim); margin-top: 0.25rem; }
        .empty-state { text-align: center; padding: 3rem; }
        .error-card { border-color: var(--red); text-align: center; color: var(--red); }
        .narrow-center { max-width: 400px; margin: 1rem auto; }
        .view-all { margin-top: 0.5rem; text-align: right; }
        .details-summary { cursor: pointer; color: var(--accent); font-size: 0.85rem; }

        /* Footer */
        footer {
            text-align: center;
            color: var(--dim);
            font-size: 0.8rem;
            padding: 2rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        @media (max-width: 700px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            nav { gap: 1rem; padding: 0 1rem; }
            nav a { font-size: 0.8rem; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav>
        <a href="{{ 'index.html' if static else '/' }}" class="brand">⚽ WC2026</a>
        <a href="{{ 'groups.html' if static else '/groups' }}" class="{{ 'active' if request.url.path == '/groups' }}">Groups</a>
        <a href="{{ 'teams.html' if static else '/teams' }}" class="{{ 'active' if request.url.path == '/teams' }}">Teams</a>
        <a href="{{ 'predict.html' if static else '/predict' }}" class="{{ 'active' if request.url.path == '/predict' }}">Predict</a>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        WC2026 Predictor — Elo-based match prediction engine. Data: football-data.org (free tier).
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
